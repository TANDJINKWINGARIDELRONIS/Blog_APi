<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogSphere — INF222</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #0f172a; }

        /* NAV */
        nav {
            background: #1a56db;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav h1 { color: white; font-size: 1.1rem; font-weight: 700; }

        nav input {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            width: 220px;
        }

        /* LAYOUT */
        .page {
            max-width: 1100px;
            margin: 28px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* FORMULAIRE */
        .form-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            position: sticky;
            top: 72px;
        }

        .form-card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }

        .form-card input,
        .form-card textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 10px;
            background: #f8fafc;
            resize: none;
        }

        .form-card input:focus,
        .form-card textarea:focus { border-color: #1a56db; background: white; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .btn-pub {
            width: 100%;
            padding: 10px;
            background: #1a56db;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .btn-pub:hover { background: #1440b8; }

        .btn-cancel {
            width: 100%;
            padding: 9px;
            background: white;
            color: #64748b;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
            display: none;
        }

        /* ARTICLES */
        .articles h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        /* CARTE */
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: 0.2s;
        }

        .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }

        .card-top { display: flex; justify-content: space-between; align-items: center; }

        .cat {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: #eff6ff;
            color: #1a56db;
            padding: 3px 10px;
            border-radius: 50px;
        }

        .card-btns { display: flex; gap: 6px; }

        .card-btns button {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid #e2e8f0;
            background: white;
            color: #64748b;
        }

        .card-btns .edit:hover  { border-color: #1a56db; color: #1a56db; }
        .card-btns .del:hover   { border-color: #ef4444; color: #ef4444; }

        .card h3 { font-size: 0.95rem; font-weight: 700; line-height: 1.4; }

        .card p  { font-size: 0.82rem; color: #64748b; line-height: 1.5;
                   display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .card-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid #f1f5f9;
            font-size: 0.75rem;
            color: #64748b;
        }

        .card-foot span:first-child { font-weight: 600; color: #0f172a; }

        /* EMPTY */
        .empty { text-align: center; padding: 48px; color: #94a3b8; }
        .empty p { margin-top: 8px; font-size: 0.85rem; }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 20px; right: 20px;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            z-index: 999;
            display: none;
        }

        #toast.ok  { background: #10b981; display: block; }
        #toast.err { background: #ef4444; display: block; }

        @media (max-width: 768px) {
            .page { grid-template-columns: 1fr; }
            .form-card { position: static; }
        }
    </style>
</head>
<body>

<nav>
    <h1>📝 BlogSphere</h1>
    <input type="text" id="searchBox" placeholder="Rechercher..." oninput="recherche()">
</nav>

<div class="page">

    <!-- FORMULAIRE -->
    <div class="form-card">
        <h2 id="formTitle">Nouvel article</h2>
        <input type="hidden" id="articleId">
        <input type="text" id="titre" placeholder="Titre *">
        <input type="text" id="auteur" placeholder="Auteur *">
        <div class="row">
            <input type="text" id="cat" placeholder="Catégorie">
            <input type="text" id="tags" placeholder="Tags">
        </div>
        <textarea id="contenu" rows="5" placeholder="Contenu *"></textarea>
        <button class="btn-pub" onclick="publier()" id="submitBtn">Publier</button>
        <button class="btn-cancel" onclick="annuler()" id="cancelBtn">Annuler</button>
    </div>

    <!-- ARTICLES -->
    <div class="articles">
        <h2>Publications <span id="countBadge" style="font-weight:400;color:#64748b;font-size:0.9rem"></span></h2>
        <div class="grid" id="articlesList"></div>
    </div>
</div>

<div id="toast"></div>

<script>
    const API = "http://localhost:3000/api/articles";
    window.onload = charger;

    async function charger() {
        const data = await (await fetch(API)).json();
        afficher(data.data);
        document.getElementById('countBadge').textContent = `(${data.count || 0})`;
    }

    async function publier() {
        const id = document.getElementById('articleId').value;
        const body = {
            titre:     document.getElementById('titre').value.trim(),
            auteur:    document.getElementById('auteur').value.trim(),
            contenu:   document.getElementById('contenu').value.trim(),
            categorie: document.getElementById('cat').value.trim(),
            tags:      document.getElementById('tags').value.trim()
        };
        if (!body.titre || !body.auteur || !body.contenu) { toast('Titre, auteur et contenu requis !', 'err'); return; }

        const res = await fetch(id ? `${API}/${id}` : API, {
            method: id ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) { toast(id ? 'Modifié !' : 'Publié !', 'ok'); annuler(); charger(); }
        else toast('Erreur.', 'err');
    }

    async function modifier(id) {
        const { data: a } = await (await fetch(`${API}/${id}`)).json();
        document.getElementById('articleId').value = a.id;
        document.getElementById('titre').value     = a.titre;
        document.getElementById('auteur').value    = a.auteur;
        document.getElementById('cat').value       = a.categorie || '';
        document.getElementById('tags').value      = a.tags || '';
        document.getElementById('contenu').value   = a.contenu;
        document.getElementById('formTitle').textContent   = 'Modifier';
        document.getElementById('submitBtn').textContent   = 'Enregistrer';
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function annuler() {
        ['articleId','titre','auteur','cat','tags','contenu'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('formTitle').textContent   = 'Nouvel article';
        document.getElementById('submitBtn').textContent   = 'Publier';
        document.getElementById('cancelBtn').style.display = 'none';
    }

    async function supprimer(id) {
        if (!confirm('Supprimer ?')) return;
        if ((await fetch(`${API}/${id}`, { method: 'DELETE' })).ok) { toast('Supprimé.', 'ok'); charger(); }
    }

    async function recherche() {
        const q = document.getElementById('searchBox').value.trim();
        if (!q) { charger(); return; }
        const data = await (await fetch(`${API}/search?query=${encodeURIComponent(q)}`)).json();
        afficher(data.data);
    }

    function afficher(articles) {
        const c = document.getElementById('articlesList');
        if (!articles?.length) {
            c.innerHTML = `<div class="empty"><h3>Aucun article</h3><p>Créez votre premier article.</p></div>`;
            return;
        }
        c.innerHTML = articles.map(a => {
            const date = a.date_creation ? new Date(a.date_creation).toLocaleDateString('fr-FR') : '';
            return `
            <div class="card">
                <div class="card-top">
                    <span class="cat">${a.categorie || 'General'}</span>
                    <div class="card-btns">
                        <button class="edit" onclick="modifier(${a.id})">✏️ Modifier</button>
                        <button class="del"  onclick="supprimer(${a.id})">🗑️ Sup.</button>
                    </div>
                </div>
                <h3>${a.titre}</h3>
                <p>${a.contenu}</p>
                <div class="card-foot">
                    <span>👤 ${a.auteur}</span>
                    <span>${date}</span>
                </div>
            </div>`;
        }).join('');
    }

    function toast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = type;
        setTimeout(() => el.className = '', 3000);
    }
</script>
</body>
</html>
